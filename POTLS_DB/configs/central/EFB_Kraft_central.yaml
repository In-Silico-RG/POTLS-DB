# ============================================================
# POTLS-DB: Palm Oil Technical Lignin Structural Dataset
# Configuration: EFB Kraft — Central parameters
# Archetype: SG-rico (S/G = 2.3)
# Biomass source: Empty Fruit Bunch (Elaeis guineensis)
# Pulping method: Kraft (NaOH + Na2S, 170°C, 2h)
#
# Parameters basis:
#   S/G ratio: HSQC-NMR experimental (Oñate-Gutiérrez et al. 2025)
#   Bond proportions: Eswaran et al. 2022 (hardwood SG-type), central values
#   DP range: triangulated from MALDI-TOF (this work) + GPC literature
#             (Mohamad Ibrahim 2004, Hussin 2014, Constant 2016)
#   H/C pred. = 1.096, O/C pred. = 0.356 (analytical verification vs Fig. 7a)
# ============================================================

project:
  name: "EFB_Kraft_central"
  dataset_id: "POTLS_EFB_KR_C"
  biomass_source: "Empty_Fruit_Bunch"
  pulping_method: "Kraft"
  parameter_set: "central"
  archetype: "SG-rico"

monomers:
  G: 0.303   # f_G = 1/(1 + S/G) = 1/3.3
  S: 0.697   # f_S = S/G/(1 + S/G) = 2.3/3.3
  H: 0.000   # H not observed in HSQC (degraded during pulping)

# Bond proportions — normalized fractions (sum = 1.00)
# Basis: hardwood SG-type lignin (Eswaran et al. 2022, Table 1)
# central values interpolated by f_S = 0.697
linkages:
  beta-O-4: 0.74   # dominant ether bond; high in SG-type
  beta-beta: 0.12  # resinol; higher in SG-type (hardwood)
  beta-5: 0.08     # phenylcoumaran; lower in SG-type
  5-5: 0.01        # biphenyl; near-absent in SG (C5 blocked by OMe in S)
  4-O-5: 0.05      # diaryl ether; moderate
  DBDO: 0.00       # dibenzodioxocin; negligible in SG-type

# Degree of polymerization range
# DP_min: Mw_MALDI / M0 = ~2000 / 205 ≈ 10
# DP_max: Mw_literature_P75 / M0 = ~3300 / 205 ≈ 16
# M0 = f_G*180.2 + f_S*210.2 = 0.303*180.2 + 0.697*210.2 = 201.3 g/mol
degree_of_polymerization:
  min: 10
  max: 16
  M0_gmol: 201.3

# Expected RDKit descriptors (for output validation)
validation_targets:
  H_C_range: [1.09, 1.15]
  O_C_range: [0.33, 0.38]
  phenolic_OH_mmol_g: [0.46, 0.76]   # experimental range from UV-vis
