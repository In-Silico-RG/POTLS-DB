  beta-O-4: 0.72
  beta-beta: 0.08
  beta-5: 0.11
  5-5: 0.03
  4-O-5: 0.05
  DBDO: 0.01
degree_of_polymerization:
  min: 3
  max: 8
  M0_gmol: 188.8

validation_targets:
  H_C_range: [1.10, 1.18]
  O_C_range: [0.31, 0.36]
