monomers:
  G: 1.000
  S: 0.000
  H: 0.000

linkages:
  beta-O-4: 0.63
  beta-beta: 0.05
  beta-5: 0.14
  5-5: 0.07
  4-O-5: 0.07
  DBDO: 0.04
degree_of_polymerization:
  min: 11
  max: 17
  M0_gmol: 180.2

validation_targets:
  H_C_range: [1.10, 1.17]
  O_C_range: [0.31, 0.35]
  phenolic_OH_mmol_g: [0.45, 0.75]
